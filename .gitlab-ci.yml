stages:
  - build

build_firmware:
  stage: build
  image: ubuntu:22.04
  before_script:
    - apt-get update -qq
    - apt-get install -y -qq gcc-arm-none-eabi binutils-arm-none-eabi make
  script:
    - arm-none-eabi-gcc --version
    - make all
  artifacts:
    name: "firmware-$CI_COMMIT_SHORT_SHA"
    paths:
      - Debug/*.elf
      - Debug/*.hex
      - Debug/*.bin
    expire_in: 7 days