stages:
  - build

build_firmware:
  stage: build
  tags:
    - stm32-runner
  before_script:
    - sudo apt-get update -qq
    - sudo apt-get install -y -qq gcc-arm-none-eabi binutils-arm-none-eabi make
  script:
    - arm-none-eabi-gcc --version
    - make all
  artifacts:
    paths:
      - Debug/*.elf
      - Debug/*.hex
      - Debug/*.bin
    expire_in: 7 days
